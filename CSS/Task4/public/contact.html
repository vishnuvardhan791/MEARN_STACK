<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accenture</title>
    <style>
        body{
            background-color: #f9f9f9;
        }
        .main-header{
            position: sticky;
            top: 0;
            display:flex;
            justify-content:flex-start;
            align-items: center;
            background-color:#f9f9f9;
            padding-left: 90px;
            gap:190px;

        }
        .nav-list{
            display: flex;
            list-style: none;
            gap: 80px;
        }
        .nav-list a{
            text-decoration: none;
            font-size: 20px;
            color: #333;
            padding: 8px 12px;
            transition: 0.3s;
            display:inline-block;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .nav-list >li>a:hover{
            background-color:#900FE3;
            color:white;
            transform:scale(1.2);
            box-shadow: 0px 4px 10px black;
        }
        .dropdown{
            position: relative;
        }
        .dropdown-menu{
            position: absolute;
            top:100%;
            left:-32px;
            display: none;
            background: #f9f9f9;
            list-style: none;
            min-width:250px;
            margin-top: 0;

        }
        .dropdown:hover .dropdown-menu{
            display: block;
        }
        .dropdown-menu li a {
            display: block;
            padding: 10px;
            transition: all 0.2s ease;
        }
        .dropdown-menu li a:hover{
            background-color: #900FE3;
            color: white;
            transform: scale(1.03);
            padding-left: 20px;
            box-shadow: 0px 4px 10px black;
        }

       
        .auth-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 60px 20px;
            font-family: sans-serif;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px black;
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            color: #333;
            margin-bottom: 25px;
            border-left: 5px solid #900FE3;
            padding-left: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Critical for layout */
        }

        .input-group input:focus {
            outline: none;
            border-color: #900FE3;
            box-shadow: 0 0 5px rgba(144, 15, 227, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background-color: #900FE3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background-color: #720cb5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px black;
        }

        .auth-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .auth-links a {
            text-decoration: none;
            font-size: 14px;
            color: #900FE3;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }


    </style>
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo">
            <img src = "Accenture-Logo-removebg-preview.png" width="150px" height="150px" alt="company logo">
        </a>

        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li class="dropdown"><a href="services.html" >Services</a>
                    <ul class="dropdown-menu">
                        <li><a href="services.html">Software and Platforms</a></li>
                        <li><a href="services.html">Cyber Security</a></li>
                    </ul>
                </li>
                <li class="dropdown"><a href="careers.html">Careers</a>
                    <ul class="dropdown-menu">
                        <li><a href="careers.html">Software Developer</a></li>
                        <li><a href="careers.html">Full Stack Developer</a></li>

                    </ul>
                </li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            
        </nav>

    </header>

    <section class="auth-container">
    <div class="auth-box">
        <h2>Sign In</h2>
        <form>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
            <div class="auth-links">
                <a href="#signup">Create Account</a>
                <a href="#reset">Forgot Password?</a>
            </div>
        </form>
    </div>

    
</section>
    
</body>
</html>
